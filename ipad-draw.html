<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Psora — Draw</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #fff;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas { display: block; }

    .btn-row {
      position: fixed;
      bottom: 36px;
      right: 36px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 32px;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-clear {
      background: #fff;
      color: #F05423;
      border: 1.5px solid #F05423;
    }

    .btn-confirm {
      background: #F05423;
      color: #fff;
      border: 1.5px solid #F05423;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="btn-row">
    <button class="btn btn-clear" id="clearBtn">Clear</button>
    <button class="btn btn-confirm" id="confirmBtn">Confirm</button>
  </div>

  <script type="module">
    /* ── FIREBASE ── */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtbPICrsVz5mBs7XIuGdGJ4WqELORQElk",
      authDomain: "psora-9110d.firebaseapp.com",
      databaseURL: "https://psora-9110d-default-rtdb.firebaseio.com",
      projectId: "psora-9110d",
      storageBucket: "psora-9110d.firebasestorage.app",
      messagingSenderId: "671697488457",
      appId: "1:671697488457:web:875c8978b37473782acd98",
      measurementId: "G-MYWGV7MS1S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvasRef = ref(db, 'psora/canvas');

    function broadcast(data) {
      set(canvasRef, data);
    }

    /* ── CONFIG ── */
    const BROADCAST_INTERVAL = 200;
    const DRAW_RADIUS = 16;
    const DRAW_ALPHA = 100;
    const DOT_SPACING = 53;
    const DOT_COLOR = [219, 219, 219];
    const BODY_COLOR = [243, 243, 243];
    const DRAW_COLOR = [240, 84, 35]; // #F05423

    /* ── BODY SILHOUETTE (normalized 0–1 from Figma SVG) ── */
    // Main body path
    const bodyPath = [
      [0.413,0.240],[0.411,0.289],[0.386,0.325],[0.384,0.364],
      [0.383,0.387],[0.386,0.401],[0.365,0.440],[0.362,0.449],
      [0.379,0.476],[0.379,0.479],[0.376,0.497],[0.377,0.500],
      [0.383,0.513],[0.383,0.513],[0.380,0.519],[0.380,0.526],
      [0.390,0.547],[0.390,0.547],[0.388,0.564],[0.396,0.577],
      [0.405,0.589],[0.438,0.584],[0.448,0.585],[0.475,0.617],
      [0.486,0.634],[0.494,0.654],[0.494,0.682],[0.493,0.697],
      [0.478,0.737],[0.474,0.744],[0.429,0.808],[0.431,0.811],
      [0.492,0.751],[0.492,0.751],[0.527,0.743],[0.519,0.655],
      [0.510,0.566],[0.500,0.557],[0.496,0.554],[0.448,0.531],
      [0.448,0.531],[0.445,0.507],[0.441,0.504],[0.437,0.496],
      [0.435,0.489],[0.433,0.460],[0.433,0.455],
      [0.416,0.419],[0.417,0.415],[0.451,0.382],[0.452,0.373],
      [0.406,0.315],[0.405,0.310],[0.413,0.291],[0.413,0.240]
    ];

    // Head/hair path
    const hairPath = [
      [0.546,0.372],[0.562,0.361],[0.571,0.349],[0.574,0.339],
      [0.576,0.330],[0.582,0.340],[0.584,0.350],[0.584,0.358],
      [0.583,0.365],[0.582,0.368],[0.568,0.384],[0.558,0.389],
      [0.545,0.390],[0.540,0.388],[0.539,0.383],[0.539,0.378],
      [0.542,0.374],[0.546,0.372]
    ];

    // Ear path
    const earPath = [
      [0.547,0.383],[0.549,0.386],[0.550,0.394],[0.549,0.399],
      [0.535,0.394],[0.535,0.383],[0.543,0.351],[0.550,0.351],
      [0.546,0.380],[0.547,0.383]
    ];

    // Arm path
    const armPath = [
      [0.533,0.462],[0.526,0.455],[0.530,0.428],[0.529,0.427],
      [0.491,0.516],[0.496,0.521],[0.549,0.464],[0.548,0.462],
      [0.541,0.471],[0.533,0.462]
    ];

    // Head highlight
    const headHighlight = [
      [0.524,0.187],[0.591,0.266],[0.646,0.364],[0.646,0.412],
      [0.635,0.459],[0.628,0.488],[0.638,0.457],[0.638,0.375],
      [0.638,0.274],[0.583,0.191],[0.515,0.192],[0.478,0.200],
      [0.492,0.193],[0.509,0.189],[0.524,0.187]
    ];

    /* ── p5.js ── */
    let cnv, drawLayer;
    let canvasW, canvasH;
    let lastBroadcast = 0;
    let totalPixels = 0;

    // Load body SVG as image for high-fidelity rendering
    let bodySvgImg;

    const bodySvgMarkup = `<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" fill="none">
      <path d="M754.5 191.297C851.764 191.297 930.613 272.649 930.613 373C930.613 422.436 911.477 467.259 880.433 500.018C903.743 468.128 917.628 428.051 917.628 384.521C917.628 280.538 838.415 196.243 740.7 196.243C722.182 196.243 704.328 199.273 687.552 204.888C708.192 196.129 730.799 191.297 754.5 191.297Z" fill="#F3F3F3"/>
      <path d="M789.37 412.96C787.443 416.332 789.37 422.113 786.961 423.558C784.552 425.003 776.362 423.558 776.362 423.558V429.821L779.735 426.93C779.735 426.93 778.289 439.938 782.625 442.346C786.961 444.755 825.019 426.93 826.946 423.558C828.873 420.186 826.464 409.587 828.873 409.587C831.282 409.587 831.764 423.076 834.654 422.113C837.545 421.149 838.99 413.923 839.472 409.587C839.953 405.252 837.063 384.054 836.581 378.273C836.099 372.492 827.91 359.485 814.421 360.93C800.932 362.376 796.596 376.346 796.596 381.646C796.596 386.945 800.45 397.544 799.005 400.916C797.559 404.288 791.297 409.587 789.37 412.96Z" fill="#F3F3F3"/>
      <path d="M786.962 391.763C788.407 395.617 792.743 399.952 791.779 402.843C790.816 405.733 770.582 402.843 770.582 391.763C770.582 380.682 790.334 358.04 791.779 359.485C793.224 360.931 785.516 387.909 786.962 391.763Z" fill="#F3F3F3"/>
      <path d="M594.39 293.004C593.907 288.668 591.977 245.31 591.977 245.31C591.977 245.31 555.3 292.522 552.404 332.025C549.508 371.529 556.747 389.835 555.3 396.58C553.852 403.324 525.861 451.018 520.553 459.689C515.244 468.361 545.648 488.112 545.648 490.521C545.648 492.93 541.304 508.828 541.787 511.718C542.27 514.609 552.404 525.689 552.404 525.689C552.404 525.689 547.578 531.47 547.578 538.696C547.578 545.922 562.056 559.893 562.056 559.893C562.056 559.893 559.16 577.718 570.743 591.207C582.325 604.696 630.102 596.988 645.544 598.433C660.987 599.879 684.634 632.156 699.112 648.535C713.59 664.915 712.142 698.156 709.247 714.053C706.351 729.951 688.012 754.039 681.739 761.747C675.465 769.455 616.589 827.265 619.967 830.637C623.345 834.009 709.247 769.455 709.247 769.455C709.247 769.455 759.436 761.265 747.371 670.696C735.307 580.127 720.346 570.973 715.038 567.12C709.729 563.266 645.544 543.514 645.544 543.514C645.544 543.514 640.236 518.944 635.41 516.536C630.584 514.127 629.136 507.382 626.241 500.156C623.345 492.931 623.345 470.293 623.345 466.435V466.434C623.345 462.58 598.733 428.857 599.698 425.485C600.663 422.113 649.405 390.799 650.853 381.646C652.301 372.492 584.255 322.39 583.773 317.091C583.29 311.792 594.872 297.339 594.39 293.004Z" fill="#F3F3F3"/>
      <path d="M767.689 473.66C756.609 465.289 763.354 437.529 761.427 436.565C759.5 435.602 706.507 528.098 713.733 533.397C720.96 538.696 791.777 475.105 789.368 473.66C786.959 472.215 778.77 482.031 767.689 473.66Z" fill="#F3F3F3"/>
    </svg>`;

    window.setup = function() {
      canvasW = window.innerWidth;
      canvasH = window.innerHeight;

      cnv = createCanvas(canvasW, canvasH);
      cnv.parent('canvas-container');
      cnv.style('display', 'block');

      drawLayer = createGraphics(canvasW, canvasH);
      drawLayer.clear();

      totalPixels = canvasW * canvasH;

      // Load body SVG as an image
      const blob = new Blob([bodySvgMarkup], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      bodySvgImg = loadImage(url);

      background(255);
    };

    function drawDotGrid() {
      noStroke();
      fill(DOT_COLOR[0], DOT_COLOR[1], DOT_COLOR[2]);
      for (let x = DOT_SPACING; x < canvasW; x += DOT_SPACING) {
        for (let y = DOT_SPACING; y < canvasH; y += DOT_SPACING) {
          ellipse(x, y, 3, 3);
        }
      }
    }

    function drawBodySilhouette() {
      if (bodySvgImg && bodySvgImg.width > 0) {
        // Scale and center the SVG to fill the canvas
        let scale = Math.max(canvasW / 1440, canvasH / 1024);
        let w = 1440 * scale;
        let h = 1024 * scale;
        let x = (canvasW - w) / 2;
        let y = (canvasH - h) / 2;
        image(bodySvgImg, x, y, w, h);
      }
    }

    function drawStroke(x, y) {
      drawLayer.noStroke();
      drawLayer.fill(DRAW_COLOR[0], DRAW_COLOR[1], DRAW_COLOR[2], DRAW_ALPHA);
      drawLayer.ellipse(x, y, DRAW_RADIUS * 2);
    }

    window.draw = function() {
      background(255);
      drawDotGrid();
      drawBodySilhouette();
      image(drawLayer, 0, 0);

      if (mouseIsPressed || touches.length > 0) {
        let px = mouseX, py = mouseY;
        if (touches.length > 0) { px = touches[0].x; py = touches[0].y; }
        if (px > 0 && px < canvasW && py > 0 && py < canvasH) {
          drawStroke(px, py);
          let ppx = pmouseX, ppy = pmouseY;
          let d = dist(ppx, ppy, px, py);
          if (d > 2) {
            let steps = Math.ceil(d / 4);
            for (let i = 1; i < steps; i++) {
              let t = i / steps;
              drawStroke(lerp(ppx, px, t), lerp(ppy, py, t));
            }
          }
        }
      }

      if (millis() - lastBroadcast > BROADCAST_INTERVAL) {
        lastBroadcast = millis();
        calcCoverage();
      }
    };

    function calcCoverage() {
      drawLayer.loadPixels();
      let count = 0;
      let px = drawLayer.pixels;
      for (let i = 3; i < px.length; i += 4) {
        if (px[i] > 10) count++;
      }
      let pct = (count / totalPixels) * 100;

      let stressLevel = Math.min(5, Math.max(1, Math.ceil(pct / 6)));
      if (pct < 0.5) stressLevel = 0;

      broadcast({
        percentage: pct,
        stressLevel: stressLevel,
        timestamp: Date.now(),
        thumbnail: cnv.canvas.toDataURL('image/jpeg', 0.3)
      });
    }

    // Prevent scrolling
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    // Clear button
    document.getElementById('clearBtn').addEventListener('click', () => {
      drawLayer.clear();
      broadcast({ percentage: 0, stressLevel: 0, timestamp: Date.now(), thumbnail: null });
    });

    // Confirm button — sends final data and locks canvas
    document.getElementById('confirmBtn').addEventListener('click', () => {
      // Calculate final coverage
      drawLayer.loadPixels();
      let count = 0;
      let px = drawLayer.pixels;
      for (let i = 3; i < px.length; i += 4) {
        if (px[i] > 10) count++;
      }
      let pct = (count / totalPixels) * 100;
      let stressLevel = Math.min(5, Math.max(1, Math.ceil(pct / 6)));
      if (pct < 0.5) stressLevel = 0;

      broadcast({
        percentage: pct,
        stressLevel: stressLevel,
        timestamp: Date.now(),
        thumbnail: cnv.canvas.toDataURL('image/jpeg', 0.3),
        confirmed: true
      });

      // Visual feedback
      document.getElementById('confirmBtn').textContent = 'Sent!';
      document.getElementById('confirmBtn').style.opacity = '0.6';
      setTimeout(() => {
        document.getElementById('confirmBtn').textContent = 'Confirm';
        document.getElementById('confirmBtn').style.opacity = '1';
      }, 2000);
    });
  </script>
</body>
</html>
