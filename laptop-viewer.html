<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psora — Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap');

    :root {
      --bg: #FAF7F2;
      --text: #2C2826;
      --accent: #D4726A;
      --accent-soft: #E8A49E;
      --canvas-bg: #FFFFFF;
      --border: #E0D8CF;
      --muted: #9A918A;
      --card-bg: #FFFFFF;
      --level-1: #7EC47E;
      --level-2: #B5CC5A;
      --level-3: #E4C84A;
      --level-4: #E4944A;
      --level-5: #D4726A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 32px 48px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img { display: block; height: 40px; width: auto; }

    main {
      padding: 32px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-content: start;
      gap: 28px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.03);
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 20px;
    }

    .coverage-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .coverage-number {
      font-family: 'Instrument Serif', serif;
      font-size: 96px;
      line-height: 1;
      color: var(--text);
      text-align: center;
      margin: auto 0;
    }

    .coverage-number span { font-size: 48px; color: var(--muted); }

    .stress-card { display: flex; flex-direction: column; }

    .stress-number {
      font-family: 'Instrument Serif', serif;
      font-size: 96px;
      line-height: 1;
      text-align: center;
      margin: auto 0;
      transition: color 0.4s ease;
      color: var(--muted);
    }

    .stress-label-text {
      font-size: 15px;
      text-align: center;
      color: var(--muted);
      font-weight: 300;
      min-height: 20px;
    }

    .stress-bar-track { display: flex; gap: 6px; margin-top: 20px; }

    .stress-bar-segment {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      transition: background 0.4s ease;
    }

    .task-card { grid-column: 1 / -1; }

    .task-group {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-group:last-child { border-bottom: none; }

    .task-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      border: none;
      outline: none;
      background: transparent;
    }

    .task-input::placeholder { color: var(--border); font-style: italic; }

    .difficulty-input {
      width: 110px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      outline: none;
      background: transparent;
      text-align: center;
    }

    .difficulty-input::placeholder { color: var(--border); font-style: italic; }

    .task-card-footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    #psoraSort {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 28px;
      background: #F05423;
      color: #fff;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    #psoraSort:hover { opacity: 0.85; }

    .waiting-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .waiting-overlay.hidden { opacity: 0; pointer-events: none; }

    .waiting-text {
      font-family: 'Instrument Serif', serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .waiting-sub {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    .waiting-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>

  <div class="waiting-overlay" id="waitingOverlay">
    <div class="waiting-text">Waiting for input<span class="waiting-dots"></span></div>
    <div class="waiting-sub">Open the drawing page on another device</div>
  </div>

  <header>
    <div class="logo"><svg width="24" height="34" viewBox="0 0 24 34" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M0.000619141 0.00469417L8.12078 0.0012212L11.1564 1.78123e-05C13.9005 -0.00152958 15.8581 0.0946492 18.3255 1.5067C19.2469 2.02696 20.0935 2.66996 20.8419 3.41803C22.9022 5.46534 23.8146 8.03902 23.8614 10.9047C23.8694 11.3947 23.8004 11.8466 23.7592 12.3266C23.3104 17.5587 19.8216 20.9222 14.7986 21.9255C13.989 22.0847 13.6782 22.0816 12.8586 22.0805C10.6546 22.0808 8.48582 21.5276 6.55128 20.4715C6.15198 20.255 5.76352 20.019 5.38719 19.7646C5.16997 19.6208 4.80857 19.3529 4.58509 19.2621C5.39658 20.7267 6.35218 22.2928 7.21002 23.742L10.6341 29.5792L12.0465 31.9793C12.2831 32.3792 12.7571 33.1422 12.9147 33.5483C11.3914 33.6013 9.67924 33.5641 8.14361 33.5641L0 33.5638L0.000619141 0.00469417Z" fill="black"/><path d="M4.5869 19.2621C3.09147 17.3787 2.18927 15.43 4.46218 13.6652C6.23061 12.2922 8.43357 11.7048 10.5894 11.2707C11.1367 11.1633 11.8883 11.1001 12.3659 10.9941C12.9045 13.5766 13.4736 16.1527 14.0731 18.7217L14.6049 21.0677C14.6509 21.2772 14.7733 21.7329 14.8004 21.9255C13.9908 22.0847 13.68 22.0816 12.8605 22.0805C10.6565 22.0808 8.48763 21.5276 6.55308 20.4715C6.15379 20.255 5.76532 20.019 5.389 19.7646C5.17178 19.6208 4.81038 19.3529 4.5869 19.2621Z" fill="#F15424"/></svg></div>
  </header>

  <main>
    <div class="card coverage-card">
      <div class="card-label">Coverage</div>
      <div class="coverage-number"><span id="pctNum">0</span><span>%</span></div>
    </div>

    <div class="card stress-card">
      <div class="card-label">Stress Level</div>
      <div class="stress-number" id="stressNum">—</div>
      <div class="stress-label-text" id="stressLabel"></div>
      <div class="stress-bar-track" id="stressBar">
        <div class="stress-bar-segment" data-level="1"></div>
        <div class="stress-bar-segment" data-level="2"></div>
        <div class="stress-bar-segment" data-level="3"></div>
        <div class="stress-bar-segment" data-level="4"></div>
        <div class="stress-bar-segment" data-level="5"></div>
      </div>
    </div>

    <div class="card task-card">
      <div class="card-label">Task Planner</div>
      <div id="taskList">
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Difficulty 1–5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Difficulty 1–5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Difficulty 1–5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Difficulty 1–5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Difficulty 1–5" onchange="clampDifficulty(this)">
        </div>
      </div>
      <div class="task-card-footer">
        <button id="psoraSort" onclick="psoraSort()">Psora Sort</button>
      </div>
    </div>
  </main>

  <script>
    window.currentStressLevel = 0; //Default is 0 (since nothing is drawn yet)

    // Based on asking different llm models (claude, gemini, chatgpt) and referncing research on how stress should be managed:
    // 1 (little to no Stress)
    // 2 (some stress)
    //3 (mild/moderate stress)
    //4 (moderately high stress levels)
    //5 (very high stress levels)
    // The orders within the array act as a guideline for how tasks shoudl eb reordered/repositioned
    var sortOrders = {
      1: [5, 4, 3, 2, 1],
      2: [4, 5, 3, 1, 2],
      3: [3, 1, 4, 2, 5],
      4: [1, 2, 3, 4, 5],
      5: [1, 2, 3, 4, 5]
    };

    function psoraSort() {
      var order = sortOrders[window.currentStressLevel] || [1, 2, 3, 4, 5];

      // Read all 5 tasks into a plain array
      var taskInputs = document.querySelectorAll('.task-input');
      var diffInputs = document.querySelectorAll('.difficulty-input');
      var tasks = [];
      for (var i = 0; i < 5; i++) {
        tasks.push({
          text: taskInputs[i].value,
          diff: parseInt(diffInputs[i].value) || 0
        });
      }

      // Sorting:
      tasks.sort(function(a, b) {
        var posA = order.indexOf(a.diff);
        var posB = order.indexOf(b.diff);
        if (posA === -1) posA = 999;
        if (posB === -1) posB = 999;
        return posA - posB;
      });

      // Write sorted values back into the inputs
      for (var i = 0; i < 5; i++) {
        taskInputs[i].value = tasks[i].text;
        diffInputs[i].value = tasks[i].diff || '';
      }
    }

    function clampDifficulty(input) {
      var v = parseInt(input.value);
      input.value = isNaN(v) ? '' : Math.min(5, Math.max(1, v));
    }
  </script>

  <script type="module" src="firebase-viewer.js"></script>
</body>
</html>
